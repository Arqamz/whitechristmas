kafka:
  brokers: "localhost:9092"
  publication_rate: 40               # total events per second across all datasets (10/dataset)

  # Per-dataset ingestion topics (Avro, Confluent wire format)
  raw_topics:
    crimes:       "raw-events-crimes"
    violence:     "raw-events-violence"
    arrests:      "raw-events-arrests"
    sex_offenders: "raw-events-sex-offenders"

  # Per-dataset alert topics (JSON, published by Spark StreamProcessor + BoltPipeline)
  alert_topics:
    crimes:       "alerts-crimes"
    violence:     "alerts-violence"
    arrests:      "alerts-arrests"
    sex_offenders: "alerts-sex-offenders"

  # Statistical anomaly alerts from StreamProcessor z-score detection
  anomaly_topic: "anomaly-alerts"

pipeline:
  window_duration_minutes: 5         # Window Bolt: sliding window size
  slide_interval_minutes: 1          # Window Bolt: slide step
  anomaly_threshold: 50              # Anomaly Bolt: crimes/window before alert
  watermark_minutes: 10              # late-data tolerance for event-time windows

analytics:
  kmeans_k: 10                       # 7.5: number of K-Means clusters
  min_crimes_for_arrest_rate: 100    # 7.2: minimum crimes for statistical significance

database:
  postgres:
    conn_string: ""    # overridden by POSTGRES_CONN_STRING env var
  mongodb:
    conn_string: ""    # overridden by MONGODB_CONN_STRING env var
