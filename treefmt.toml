# Unified formatter configuration for the entire workspace
# This file is the single source of truth for code formatting and linting
# Run: treefmt (formats all supported files)
# Run: treefmt --check (CI mode - check without changes)

[build]
on-unmatched = "warn"

# =============================================================================
# SCALA - scalafmt for formatting
# =============================================================================
[formatter.scala-format]
command = "scalafmt"
includes = ["*.scala"]
excludes = ["target", ".git", "project"]

# =============================================================================
# JAVASCRIPT/TYPESCRIPT - Prettier for formatting
# =============================================================================
[formatter.prettier]
command = "prettier"
options = ["--write", "--print-width=80"]
includes = ["*.js", "*.jsx", "*.ts", "*.tsx", "*.json", "*.md"]
excludes = ["node_modules", ".next", "dist", "build", "package-lock.json", "yarn.lock"]

# =============================================================================
# JAVASCRIPT/TYPESCRIPT - ESLint for linting
# =============================================================================
[formatter.eslint]
command = "eslint"
options = ["--fix", "--max-warnings=0"]
includes = ["*.js", "*.jsx", "*.ts", "*.tsx"]
excludes = ["node_modules", ".next", "dist", "build", ".eslintignore"]

# =============================================================================
# NIX - nixfmt for formatting (statix is used separately for linting)
# =============================================================================
[formatter.nix]
command = "nixfmt"
includes = ["*.nix"]
excludes = ["flake.lock"]

# Note: statix is used as a separate linter, not as a formatter in treefmt

# =============================================================================
# SHELL - shfmt for shell script formatting
# =============================================================================
[formatter.shell-format]
command = "shfmt"
options = ["-i", "2", "-w", "-s"]
includes = ["*.sh"]
excludes = [".git"]

# =============================================================================
# SHELL - shellcheck for shell script linting
# =============================================================================
[formatter.shell-lint]
command = "shellcheck"
options = ["-x", "--format=gcc"]
includes = ["*.sh"]
excludes = [".git"]

# =============================================================================
# YAML - yamllint for YAML linting
# =============================================================================
[formatter.yaml]
command = "yamllint"
options = ["-f", "parsable", "-d", "{extends: relaxed, rules: {line-length: {max: 120}}}"]
includes = ["*.yaml", "*.yml"]
excludes = [".git", "node_modules", ".next"]

# =============================================================================
# GO - gofmt for code formatting
# =============================================================================
[formatter.go-format]
command = "gofmt"
options = ["-w"]
includes = ["*.go"]
excludes = ["vendor", ".git", "build"]

# =============================================================================
# GO - golangci-lint for linting
# =============================================================================
[formatter.go-lint]
command = "golangci-lint"
options = ["run", "--fix"]
includes = ["*.go"]
excludes = ["vendor", ".git", "build"]

# =============================================================================
# RUST - rustfmt for code formatting
# =============================================================================
[formatter.rust-format]
command = "rustfmt"
options = ["--edition", "2021"]
includes = ["*.rs"]
excludes = ["target", ".git"]

# =============================================================================
# RUST - clippy for linting (runs via cargo)
# =============================================================================
[formatter.rust-clippy]
command = "cargo"
options = ["clippy", "--all", "--all-targets", "--all-features", "--fix", "--allow-dirty"]
includes = ["*.rs"]
excludes = ["target", ".git"]

# =============================================================================
# CI PROFILE - Strict checks without auto-formatting
# =============================================================================
[profile.ci]
formatters = ["scala-format", "nix", "prettier", "eslint", "shell-format", "shell-lint", "yaml", "go-format", "go-lint", "rust-format"]

# =============================================================================
# DEFAULT PROFILE - Auto-formatting and fixing
# =============================================================================
[profile.default]
formatters = ["scala-format", "prettier", "eslint", "shell-format", "shell-lint", "nix", "yaml", "go-format", "go-lint", "rust-format"]
