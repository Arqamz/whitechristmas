# Unified formatter configuration for the entire workspace
# This file is the single source of truth for code formatting
# Run: treefmt (formats all supported files)
# Run: treefmt --ci (CI mode - fail if files would change)
#
# Note: linters that require module context (golangci-lint, cargo clippy, eslint)
# are intentionally excluded — they run as dedicated lefthook pre-push commands.

[build]
on-unmatched = "warn"

# =============================================================================
# SCALA - scalafmt for formatting
# =============================================================================
[formatter.scala-format]
command = "scalafmt"
includes = ["*.scala"]
excludes = ["target", ".git", "project"]

# =============================================================================
# JAVASCRIPT/TYPESCRIPT - Prettier for formatting
# =============================================================================
[formatter.prettier]
command = "prettier"
options = ["--write", "--print-width=80"]
includes = ["*.js", "*.jsx", "*.ts", "*.tsx", "*.json", "*.md"]
excludes = ["node_modules", ".next", "dist", "build", "package-lock.json", "yarn.lock", "bun.lock"]

# =============================================================================
# NIX - nixfmt for formatting
# =============================================================================
[formatter.nix]
command = "nixfmt"
includes = ["*.nix"]
excludes = ["flake.lock"]

# =============================================================================
# SHELL - shfmt for shell script formatting
# =============================================================================
[formatter.shell-format]
command = "shfmt"
options = ["-i", "2", "-w", "-s"]
includes = ["*.sh"]
excludes = [".git"]

# =============================================================================
# SHELL - shellcheck for shell script linting
# =============================================================================
[formatter.shell-lint]
command = "shellcheck"
options = ["-x", "--format=gcc"]
includes = ["*.sh"]
excludes = [".git"]

# =============================================================================
# YAML - yamllint for YAML linting
# =============================================================================
[formatter.yaml]
command = "yamllint"
options = ["-f", "parsable", "-d", "{extends: relaxed, rules: {line-length: {max: 120}}}"]
includes = ["*.yaml", "*.yml"]
excludes = [".git", "node_modules", ".next"]

# =============================================================================
# GO - gofmt for code formatting (golangci-lint runs in lefthook, needs module context)
# =============================================================================
[formatter.go-format]
command = "gofmt"
options = ["-w"]
includes = ["*.go"]
excludes = ["vendor", ".git", "build"]

# =============================================================================
# RUST - rustfmt for code formatting (cargo clippy runs in lefthook, needs Cargo.toml context)
# =============================================================================
[formatter.rust-format]
command = "rustfmt"
options = ["--edition", "2021"]
includes = ["*.rs"]
excludes = ["target", ".git"]

# =============================================================================
# CI PROFILE - Strict format checks (no linters that need module context)
# =============================================================================
[profile.ci]
formatters = ["scala-format", "nix", "prettier", "shell-format", "shell-lint", "yaml", "go-format", "rust-format"]

# =============================================================================
# DEFAULT PROFILE - Auto-formatting
# =============================================================================
[profile.default]
formatters = ["scala-format", "prettier", "shell-format", "shell-lint", "nix", "yaml", "go-format", "rust-format"]
